name: Patch cultivar records

on:
  push:
    branches:
      - fix-kultivare-schema
    paths:
      - .github/workflows/patch-kultivare.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-kultivare-schema
      - name: Patch public/kultivare.json
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import json
          import textwrap

          path = Path("public/kultivare.json")
          source = path.read_text(encoding="utf-8")

          updates = {'Goldkirsch': {'name': 'Goldkirsch',
                          'thc': '18-30%',
                          'cbd': '<1%',
                          'terpengehalt': '2.722%',
                          'terpenprofil': ['Caryophyllen', 'Myrcen', 'Limonen', 'Humulen', 'Linalool'],
                          'wirkungen': ['analgetisch', 'entzündungshemmend', 'anxiolytisch', 'antidepressiv'],
                          'typ': 'sativa-dominant',
                          'status': 'active',
                          'produktlinie': 'HUALA',
                          'genetics': 'God Bud x Black Cherry Punch',
                          'smell': 'Erdig, Kirschen, dunkle Beeren',
                          'taste': 'Fruchtig, süß, beerig',
                          'code': 'GOL'},
           'Orange Sherbert': {'name': 'Orange Sherbert',
                               'thc': '20-30%',
                               'cbd': '<1%',
                               'terpengehalt': '1.28%',
                               'terpenprofil': ['Caryophyllen', 'Limonen', 'Humulen', 'Linalool', 'Myrcen'],
                               'wirkungen': [],
                               'typ': 'sativa-dominant',
                               'status': 'active',
                               'produktlinie': 'HUALA',
                               'genetics': 'Agent Orange x Sunset Sherbert',
                               'smell': 'Zitrus, Mandarine',
                               'taste': 'Erdige Noten, cremig, beerig',
                               'code': 'OSB'},
           'Triangle Mints': {'name': 'Triangle Mints',
                              'thc': '20-25%',
                              'cbd': '<1%',
                              'terpengehalt': '2.68%',
                              'terpenprofil': ['Myrcen', 'Caryophyllen', 'Linalool', 'Limonen', 'Humulen'],
                              'wirkungen': ['entzündungshemmend', 'neuroprotektiv'],
                              'typ': 'indica-dominant',
                              'status': 'active',
                              'produktlinie': 'HUALA',
                              'genetics': 'Triangle Kush x Animal Mints',
                              'smell': 'Erdig, würzig',
                              'taste': 'Erdige Noten, fruchtig',
                              'code': 'TRM'},
           'Cherry Bang Bang': {'name': 'Cherry Bang Bang',
                                'thc': '25-33%',
                                'cbd': '<1%',
                                'terpengehalt': '4.26%',
                                'terpenprofil': ['Limonen', 'Linalool', 'Myrcen', 'Caryophyllen', 'Ocimen'],
                                'wirkungen': ['entzündungshemmend', 'antioxidativ', 'antimykotisch', 'entspannend'],
                                'typ': 'indica-dominant',
                                'status': 'active',
                                'produktlinie': 'EVOLUTION',
                                'genetics': 'Cherry Cosmo x Red Runtz',
                                'smell': 'Fruchtig, Kirsche, beerig, Candy',
                                'taste': 'Kirsche, Candy, leicht süß-säuerlich',
                                'code': 'CBB'},
           'London Pound Cake': {'name': 'London Pound Cake',
                                 'thc': '25-33%',
                                 'cbd': '<1%',
                                 'terpengehalt': '1.38%',
                                 'terpenprofil': ['Caryophyllen', 'Myrcen', 'Limonen', 'Linalool', 'Humulen'],
                                 'wirkungen': ['analgetisch', 'entzündungshemmend', 'anxiolytisch', 'antidepressiv'],
                                 'typ': 'indica-dominant',
                                 'status': 'active',
                                 'produktlinie': 'EVOLUTION',
                                 'genetics': 'Sunset Sherbert x Undisclosed Cookies Cross',
                                 'smell': 'Süß, cremig, beerig, Zitrus, Gebäck',
                                 'taste': 'Cremig, beerig, würzig, süßes Gebäck',
                                 'code': 'LPC'},
           'Purple Gas Mask': {'name': 'Purple Gas Mask',
                               'thc': '20-33%',
                               'cbd': '<1%',
                               'terpengehalt': '3.01%',
                               'terpenprofil': ['Limonen', 'Linalool', 'Germacren B', 'Caryophyllen', 'Selinene'],
                               'wirkungen': ['entzündungshemmend', 'antioxidativ', 'antimykotisch', 'entspannend'],
                               'typ': 'indica-dominant',
                               'status': 'active',
                               'produktlinie': 'EVOLUTION',
                               'genetics': 'Purple Kush x Gas Mask',
                               'smell': 'Skunkig, erdig',
                               'taste': 'Süß, beerig',
                               'code': 'PGM'},
           'Purple Octane': {'name': 'Purple Octane',
                             'thc': '20-30%',
                             'cbd': '<1%',
                             'terpengehalt': '1.64%',
                             'terpenprofil': ['Caryophyllen', 'Humulen', 'Linalool', 'Myrcen', 'Limonen'],
                             'wirkungen': [],
                             'typ': 'indica-dominant',
                             'status': 'active',
                             'produktlinie': 'HUALA',
                             'genetics': '(Biscotti x Sherb BX1) x Jealousy F2',
                             'smell': 'Fruchtig, cremig, würzig',
                             'taste': 'Würzig, erdig',
                             'code': 'OCT'},
           'Durban Cherry': {'name': 'Durban Cherry',
                             'thc': '22-30%',
                             'cbd': '<1%',
                             'terpengehalt': '2.388%',
                             'terpenprofil': ['Terpinolen', 'Myrcen', 'Caryophyllen', 'Ocimen', 'Limonen'],
                             'wirkungen': ['entzündungshemmend', 'analgetisch'],
                             'typ': 'sativa-dominant',
                             'status': 'active',
                             'produktlinie': 'HUALA',
                             'genetics': 'Durban Poison x Trop Cherry',
                             'smell': 'Fruchtig, Kirsche, Zitrus, würzig',
                             'taste': 'Fruchtig, Kirsche, Zitrus, würzig',
                             'code': 'DBC'}}

          blocks = []
          in_string = False
          escape = False
          depth = 0
          start = None

          for index, char in enumerate(source):
              if in_string:
                  if escape:
                      escape = False
                  elif char == "\\":
                      escape = True
                  elif char == '"':
                      in_string = False
                  continue

              if char == '"':
                  in_string = True
              elif char == "{":
                  if depth == 0:
                      line_start = source.rfind("\n", 0, index) + 1
                      start = line_start
                  depth += 1
              elif char == "}":
                  depth -= 1
                  if depth == 0 and start is not None:
                      blocks.append(source[start:index + 1].rstrip())
                      start = None

          records = []
          found = set()

          for block in blocks:
              record = json.loads(block.strip())
              name = record.get("name")
              if name in updates:
                  record = updates[name]
                  block = textwrap.indent(
                      json.dumps(record, ensure_ascii=False, indent=4),
                      "    "
                  )
                  found.add(name)
              records.append((record.get("name", ""), block))

          for name, record in updates.items():
              if name not in found:
                  block = textwrap.indent(
                      json.dumps(record, ensure_ascii=False, indent=4),
                      "    "
                  )
                  records.append((name, block))

          records.sort(key=lambda item: item[0].casefold())
          output = "[\n" + ",\n".join(block for _, block in records) + "\n]\n"
          path.write_text(output, encoding="utf-8")

          result = json.loads(output)
          required = {
              "name", "thc", "cbd", "terpengehalt", "terpenprofil", "wirkungen",
              "typ", "status", "produktlinie", "genetics", "smell", "taste", "code"
          }
          for record in result:
              missing = required - record.keys()
              if missing:
                  raise ValueError(f"{record.get('name')}: missing fields {sorted(missing)}")

          for name, expected in updates.items():
              actual = next((item for item in result if item.get("name") == name), None)
              if actual != expected:
                  raise ValueError(f"Update failed for {name}")

          PY
      - name: Commit corrected data and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/patch-kultivare.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/kultivare.json .github/workflows/patch-kultivare.yml
          git commit -m "Fix cultivar records and schema"
          git push origin HEAD:fix-kultivare-schema
